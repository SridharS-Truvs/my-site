<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 58"
     role="img" aria-labelledby="logo-v1-title">
  <title id="logo-v1-title">Sridhar K. Sannidhi — GW2R</title>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap');
    ]]></style>
  </defs>

  <!--
    MARK: Geometric S — single open stroke path
    Traces the letterform of "S": top bar → right curve down →
    crossbar left → left curve down → bottom bar right.
    Stroke-linecap="round" gives a refined calligraphic feel.
    Amber (#F0A500) — works on both dark and light backgrounds.
  -->
  <g transform="translate(2, 4)">
    <path
      d="M 5,2 H 24 Q 33,2 33,11 V 20 Q 33,27 26,27 H 8 Q 1,27 1,34 V 42 Q 1,49 8,49 H 28"
      stroke="#F0A500"
      stroke-width="4.5"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!--
    WORDMARK: Primary name
    Cormorant Garamond 400 — editorial serif, institutional authority.
    fill="currentColor" → adapts to dark (#EDECEA) or light (#1A1D24)
    based on the container's CSS color property.
  -->
  <text
    x="52"
    y="32"
    font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
    font-size="23"
    font-weight="400"
    letter-spacing="0.06em"
    fill="currentColor"
  >SRIDHAR K. SANNIDHI</text>

  <!-- Subtle rule between name and subtitle -->
  <line
    x1="52" y1="38"
    x2="375" y2="38"
    stroke="currentColor"
    stroke-width="0.5"
    opacity="0.12"
  />

  <!--
    SUBTITLE: Role / firm identifier
    IBM Plex Mono — technical precision, credential feel.
    Fixed amber — amber reads on both backgrounds.
  -->
  <text
    x="52"
    y="50"
    font-family="'IBM Plex Mono', 'Menlo', 'Courier New', monospace"
    font-size="8"
    font-weight="400"
    letter-spacing="0.2em"
    fill="#F0A500"
    opacity="0.9"
  >GW2R · CLOUD &amp; AI ARCHITECTURE</text>

</svg>
